<!DOCTYPE html>
<html lang="en">
    <head>
        <title>140mi - Password Change</title>
        <link href="static/signup.css" rel="stylesheet" type="text/css" />
    </head>
    <body>
        <ul>
            <li class="logo" >
                <a href="/"><img src="{{ url_for('static', filename='140mi-logo.png') }}"  alt="140 logo" height="80px"></a>
              </li>
              <li><a href="/about">Account Manager</a></li>
              <li><a href="/search">Search</a></li>
              {% if session['email'] %}
              <li><a href="/favorites">Saved</a></li>
              <li><a href="/account">Account</a></li>
              <li><a href="/logout">Logout</a></li>
              <li><a href="/chat">AstroBot</a></li>
              {% else %}
              <li><a href="/login">Login</a></li>
              <li><a href="/signup">Register</a></li>
              {% endif %}
          </ul>
        <div class="content">
        <form action="/change_pass" method="POST">
            <div class="input-box">
                <label for="pass">Old Password:</label>
                <input type="password" name="oldpass" required>
            </div>
            <div class="input-box">
                <label for="pass">New Password:</label>
                <input type="password" name="newpass" required>
            </div>
            <div class="input-box">
                <label for="pass2">Confirm New Password:</label>
                <input type="password" name="newpass2" required>
            </div>
            <div class="input-submit">
                <button type="submit" name="change_email">Change Password</button>
            </div>
        </form>
        <p class="error">{{ error }}</p>
        </div>

        
    </body>
</html>
