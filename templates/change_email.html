<!DOCTYPE html>
<html lang="en">
    <head>
        <title>140mi - Email Change</title>
        <link href="static/signup.css" rel="stylesheet" type="text/css" />
    </head>
    <body>
        <ul>
            <li class="logo" >
                <a href="/"><img src="{{ url_for('static', filename='140mi-logo.png') }}"  alt="140 logo" height="80px"></a>
              </li>
              <li><a href="/about">Account </a></li>
              <li><a href="/search">Search</a></li>
              {% if session['email'] %}
              <li><a href="/favorites">Saved</a></li>
              <li><a href="/account">Account</a></li>
              <li><a href="/logout">Logout</a></li>
              <li><a href="/chat">AstroBot</a></li>
              {% else %}
              <li><a href="/login">Login</a></li>
              <li><a href="/signup">Register</a></li>
              {% endif %}
          </ul>
        <div class="content">
        <form action="/change_email" method="POST">
            <div class="input-box">
                <label for="pass">New email:</label>
                <input type="email" name="new_email" required>
            </div>
            <div class="input-box">
                <label for="pass">Password:</label>
                <input type="password" name="pass" required>
            </div>
            <div class="input-submit">
                <button type="submit" name="submit">Change Email</button>
            </div>
        </form>
        <p class="error">{{ error }}</p>
        <p class="error" style="color: white">{{ message }}</p>
        </div>

        
    </body>
</html>
