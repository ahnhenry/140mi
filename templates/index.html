<!DOCTYPE html>
<html lang="en">
    <head>
        <title>140mi - Home</title>
        <link href="static/index.css" rel="stylesheet" type="text/css" />
    </head>
    <body>
        <ul>
            <li class="logo">
                <a href="/"><img src="{{ url_for('static', filename='140mi-logo.png') }}"  alt="140 logo" height="80px"></a>
            </li>
            <li><a href="/about">About</a></li>
            <li><a href="/search">Search</a></li>
            {% if session['email'] %}
            <li><a href="/favorites">Saved</a></li>
            <li><a href="/account">Account</a></li>
            <li><a href="/logout">Logout</a></li>
            {% else %}
            <li><a href="/login">Login</a></li>
            <li><a href="/signup">Register</a></li>
            {% endif %}

          </ul>
          
        <div class="content">
            <h2>NASA Picture of the Day</h2>
            <img src="{{ apod.url }}" class="pic" alt="{{ apod.title }}" >
            <div class="text">
                <h2>{{ apod.title }}</h2>
                <p>{{ apod.date }}</p>
                <p>{{ apod.explanation }}</p>
            </div>
        </div>
        
    </body>
</html>
