c<!DOCTYPE html>
<html lang="en">
    <head>
        <title>140mi - Saved</title>
        <link href="static/main.css" rel="stylesheet" type="text/css" />
    </head>
    <body>
        <ul>
            <li class="logo">
                <a href="/"><img src="{{ url_for('static', filename='140mi-logo.png') }}"  alt="140 logo" height="80px"></a>
            </li>
            <li><a href="/about">About</a></li>
            <li><a href="/search">Search</a></li>
            {% if session['email'] %} 
            <li><a href="/favoritese">Saved</a></li>
            <li><a href="/account">Account</a></li>
            <li><a href="/logout">Logout</a></li>
            <li><a href="/chat">AstroBot</a></li>
            {% else %}
            <li><a href="/login">Login</a></li>
            <li><a href="/signup">Register</a></li>
            {% endif %} 

          </ul>
          
          <div class="content">
            <h2 style="color: white;">Saved Images</h2>
            <div class="results">
              <div class="photo-grid">
                {% for photo in photos %}
                <div class="photo-card" onclick="openLightbox( '{{ photo.src }}', '{{ photo.title }}')">
                  <img src=" {{ photo.src }} " alt="{{ photo.title }}" />
                  <p>{{ photo.title }} · {{ photo.date }}</p>
                </div>
                {% endfor %}
              </div>
==
              </div>          
            </div>

        <p>{{ error }}</p>

        <div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
            <div class="lightbox-inner">
              <button class="lightbox-close" onclick="document.getElementById('lightbox').classList.remove('open')">&#x2715;</button>
              <img id="lightbox-img" src="" alt="" />
              <p class="lightbox-title" id="lightbox-title"></p>
            </div>
          </div>
    </body>
    <script>
        function openLightbox(src, title) {
        document.getElementById('lightbox-img').src = src;
        document.getElementById('lightbox-title').textContent = title;
        document.getElementById('lightbox').classList.add('open');
        }

        function closeLightbox(e) {
        if (e.target === document.getElementById('lightbox')) {
            document.getElementById('lightbox').classList.remove('open');
        }
        }
    </script>
</html>
